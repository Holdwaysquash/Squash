<!-- CENTRAL SIDEBAR LOGIC (Driven from this file only) -->
<script>
    (function() {
        // 1. Automatically highlight the active link matching the current page name
        const pageName = window.location.pathname.split('/').pop();
        if (pageName) {
            // Looks inside this file layout for the active link
            const currentLink = document.querySelector(`.sidebar a[href*="${pageName}"]`);
            if (currentLink) {
                currentLink.classList.add('active');
            }
        }

        // 2. Direct Toggle Action: Listens for clicks on the toggle button
        const toggleBtn = document.getElementById('toggle-sidebar-btn');
        if (toggleBtn) {
            toggleBtn.onclick = function() {
                document.body.classList.toggle('sidebar-collapsed');
            };
        }
    })();
</script>
